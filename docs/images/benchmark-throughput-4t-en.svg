<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
<style>
 .bg { fill: #f8fafc; }
 .title { font: bold 16px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; }
 .axisLabel { font: 12px -apple-system,BlinkMacSystemFont,sans-serif; fill: #6b7280; }
 .tickLabel { font: 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #9ca3af; }
 .apiLabel { font: 12px -apple-system,BlinkMacSystemFont,sans-serif; fill: #374151; text-anchor: middle; }
 .dataLabel { font: 10px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; text-anchor: middle; }
 .legendText { font: 12px -apple-system,BlinkMacSystemFont,sans-serif; fill: #374151; }
 .gridline { stroke: #e5e7eb; stroke-width: 1; }
 .baseline { stroke: #d1d5db; stroke-width: 1; }
 .bar-perf { fill: #22c55e; }
 .bar-tomcat { fill: #3b82f6; }
 .bar-undertow { fill: #f59e0b; }
 .bar-webflux { fill: #8b5cf6; }
</style>
<rect class="bg" x="0" y="0" width="1100" height="520" rx="12"/>
<text x="30" y="32" class="title">4-Thread Throughput (ops/sec)</text>

<!-- Y-axis gridlines -->
<line x1="80" y1="430" x2="1060" y2="430" class="baseline"/>
<line x1="80" y1="335" x2="1060" y2="335" class="gridline"/>
<line x1="80" y1="240" x2="1060" y2="240" class="gridline"/>
<line x1="80" y1="145" x2="1060" y2="145" class="gridline"/>
<line x1="80" y1="50" x2="1060" y2="50" class="gridline"/>

<!-- Y-axis labels -->
<text x="68" y="434" class="tickLabel" text-anchor="end">0</text>
<text x="68" y="339" class="tickLabel" text-anchor="end">9,000</text>
<text x="68" y="244" class="tickLabel" text-anchor="end">18,000</text>
<text x="68" y="149" class="tickLabel" text-anchor="end">27,000</text>
<text x="68" y="54" class="tickLabel" text-anchor="end">36,000</text>

<!-- Legend -->
<rect x="720" y="16" width="14" height="14" rx="2" class="bar-perf"/>
<text x="740" y="28" class="legendText">perf</text>
<rect x="790" y="16" width="14" height="14" rx="2" class="bar-tomcat"/>
<text x="810" y="28" class="legendText">Tomcat</text>
<rect x="870" y="16" width="14" height="14" rx="2" class="bar-undertow"/>
<text x="890" y="28" class="legendText">Undertow</text>
<rect x="960" y="16" width="14" height="14" rx="2" class="bar-webflux"/>
<text x="980" y="28" class="legendText">WebFlux</text>

<!-- Helper: each group at x, with bars at x, x+29, x+58, x+87. Bar width=22 -->
<!-- Bar height scale: 370px / 36000 = 0.010278 -->

<!-- Group 1: json - base x=100 -->
<rect x="100" y="155" width="22" height="275" class="bar-perf"/>
