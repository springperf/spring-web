<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520">
<style>
 .card { fill: #f8fafc; }
 .title { font: bold 15px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; }
 .sectionTitle { font: bold 13px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; }
 .bucketLabel { font: 12px -apple-system,BlinkMacSystemFont,sans-serif; fill: #374151; text-anchor: middle; }
 .bucketDesc { font: 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #6b7280; text-anchor: middle; }
 .complexity { font: bold 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; text-anchor: middle; }
 .nodeLabel { font: 12px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; }
 .nodeDesc { font: 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #6b7280; }
 .arrowLabel { font: 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #9ca3af; text-anchor: middle; }
 .bucket { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; }
 .node-ok { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.5; }
 .node-fallback { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }
 .node-last { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1.5; }
 .hitLabel { fill: #16a34a; }
 .missLabel { fill: #dc2626; }
 .arrow { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
</style>
<rect class="card" x="0" y="0" width="680" height="520" rx="12"/>

<text x="30" y="30" class="title">O(1) Routing — Multi-Level Optimizer Chain</text>

<!-- Stage 1: Bucketing -->
<text x="30" y="60" class="sectionTitle">Step 1: Route Bucketing</text>

<rect x="30" y="75" width="195" height="85" rx="8" class="bucket"/>
<text x="127" y="96" class="bucketLabel">No Wildcard</text>
<text x="127" y="113" class="bucketDesc">/api/user/list</text>
<text x="127" y="130" class="bucketDesc">→ simpleUrlList</text>
<text x="127" y="147" class="complexity">HashMap.get  O(1)</text>

<rect x="242" y="75" width="195" height="85" rx="8" class="bucket"/>
<text x="340" y="96" class="bucketLabel">Single-Level Wildcard</text>
<text x="340" y="113" class="bucketDesc">/api/user/{id}</text>
<text x="340" y="130" class="bucketDesc">→ simpleWildcardList</text>
<text x="340" y="147" class="complexity">Prefix/Suffix Index  O(1)</text>

<rect x="454" y="75" width="195" height="85" rx="8" class="bucket"/>
<text x="552" y="96" class="bucketLabel">Full Wildcard</text>
<text x="552" y="113" class="bucketDesc">/**</text>
<text x="552" y="130" class="bucketDesc">→ fullWildcardList</text>
<text x="552" y="147" class="complexity">Linear Scan  O(n)</text>

<text x="340" y="175" class="bucketDesc">90%+ of routes fall into the no-wildcard bucket — single HashMap.get() hit</text>

<line x1="340" y1="185" x2="340" y2="205" class="arrow"/>
<polygon points="335,205 340,213 345,205" fill="#94a3b8"/>

<!-- Stage 2: Optimizer Chain -->
<text x="30" y="230" class="sectionTitle">Step 2: Optimizer Chain (cascade)</text>

<rect x="165" y="245" width="350" height="44" rx="8" class="node-ok"/>
<text x="180" y="264" class="nodeLabel">FullPathRouterOptimizer</text>
<text x="180" y="278" class="nodeDesc">HashMap.get(path) — hits 90%+ of requests</text>
<text x="530" y="264" class="complexity" text-anchor="middle" fill="#16a34a">O(1)</text>
<text x="530" y="280" class="hitLabel" text-anchor="middle" font-size="10">hit→return</text>

<line x1="340" y1="289" x2="340" y2="307" class="arrow"/>
<polygon points="335,307 340,315 345,307" fill="#94a3b8"/>
<text x="310" y="302" class="arrowLabel">miss</text>

<rect x="165" y="315" width="350" height="44" rx="8" class="node-fallback"/>
<text x="180" y="334" class="nodeLabel">PrefixPathRouterOptimizer</text>
<text x="180" y="348" class="nodeDesc">HashMap.get(prefix) — prefix matching</text>
<text x="530" y="334" class="complexity" text-anchor="middle" fill="#16a34a">O(1)</text>
<text x="530" y="350" class="hitLabel" text-anchor="middle" font-size="10">hit→return</text>

<line x1="340" y1="359" x2="340" y2="377" class="arrow"/>
<polygon points="335,377 340,385 345,377" fill="#94a3b8"/>
<text x="310" y="372" class="arrowLabel">miss</text>

<rect x="165" y="385" width="350" height="44" rx="8" class="node-fallback"/>
<text x="180" y="404" class="nodeLabel">SuffixPathRouterOptimizer</text>
<text x="180" y="418" class="nodeDesc">HashMap.get(suffix) — suffix matching</text>
<text x="530" y="404" class="complexity" text-anchor="middle" fill="#16a34a">O(1)</text>
<text x="530" y="420" class="hitLabel" text-anchor="middle" font-size="10">hit→return</text>

<line x1="340" y1="429" x2="340" y2="447" class="arrow"/>
<polygon points="335,447 340,455 345,447" fill="#94a3b8"/>
<text x="310" y="442" class="arrowLabel">miss</text>

<rect x="165" y="455" width="350" height="44" rx="8" class="node-last"/>
<text x="180" y="474" class="nodeLabel">LoopPathPatternRouterOptimizer</text>
<text x="180" y="488" class="nodeDesc">Linear scan PathPatternRouter[] — last resort</text>
<text x="530" y="474" class="complexity" text-anchor="middle" fill="#dc2626">O(n)</text>
</svg>