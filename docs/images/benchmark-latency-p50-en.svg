<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
<style>
 .bg { fill: #f8fafc; }
 .title { font: bold 14px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; }
 .sectionTitle { font: bold 13px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; text-anchor: middle; }
 .tickLabel { font: 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #9ca3af; }
 .groupLabel { font: 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #374151; text-anchor: middle; }
