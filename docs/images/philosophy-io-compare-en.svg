<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
<style>
 .card { fill: #f8fafc; }
 .title { font: bold 15px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; }
 .subtitle { font: 12px -apple-system,BlinkMacSystemFont,sans-serif; fill: #6b7280; }
 .sectionLabel { font: bold 13px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; text-anchor: middle; }
 .desc { font: 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #6b7280; text-anchor: middle; }
 .ioBlock { font: 10px -apple-system,BlinkMacSystemFont,sans-serif; fill: #fff; text-anchor: middle; }
 .resultLabel { font: bold 13px -apple-system,BlinkMacSystemFont,sans-serif; fill: #1f2937; }
 .resultVal { font: bold 18px -apple-system,BlinkMacSystemFont,sans-serif; fill: #16a34a; }
 .resultUnit { font: 11px -apple-system,BlinkMacSystemFont,sans-serif; fill: #6b7280; }
 .vs { font: bold 20px -apple-system,BlinkMacSystemFont,sans-serif; fill: #d1d5db; text-anchor: middle; }
</style>

<rect class="card" x="0" y="0" width="720" height="400" rx="12"/>

<text x="360" y="28" class="title" text-anchor="middle">Non-blocking vs Batching: Same 1000 Requests</text>

<!-- ===== LEFT: Non-blocking IO ===== -->
<text x="200" y="55" class="sectionLabel">Non-blocking IO</text>
<text x="200" y="70" class="desc">Still 1000 IO operations, just "hidden"</text>

<!-- IO blocks row 1 -->
<rect x="50" y="85" width="26" height="14" rx="2" fill="#ef4444"/>
