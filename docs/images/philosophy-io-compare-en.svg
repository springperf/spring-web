<text x="200" y="155" class="desc">...（1000 individual IO operations total）</text>

<text x="200" y="178" class="resultLabel" fill="#dc2626">IO count: 1000</text>
<text x="200" y="195" class="resultLabel" fill="#dc2626">Total time: 1000 × 10ms = ~10000ms</text>

<!-- ===== VS ===== -->
<text x="370" y="140" class="vs">VS</text>

<!-- ===== RIGHT: Batching ===== -->
<text x="540" y="55" class="sectionLabel">Batching</text>
<text x="540" y="70" class="desc">IO count drops from 1000 to 10 — fundamental reduction</text>

<!-- Batch blocks -->
<rect x="430" y="85" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="449" y="103" class="ioBlock">Batch 1</text>
<rect x="478" y="85" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="497" y="103" class="ioBlock">Batch 2</text>
<rect x="526" y="85" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="545" y="103" class="ioBlock">Batch 3</text>
<rect x="574" y="85" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="593" y="103" class="ioBlock">Batch 4</text>
<rect x="622" y="85" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="641" y="103" class="ioBlock">Batch 5</text>

<rect x="430" y="123" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="449" y="141" class="ioBlock">Batch 6</text>
<rect x="478" y="123" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="497" y="141" class="ioBlock">Batch 7</text>
<rect x="526" y="123" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="545" y="141" class="ioBlock">Batch 8</text>
<rect x="574" y="123" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="593" y="141" class="ioBlock">Batch 9</text>
<rect x="622" y="123" width="38" height="28" rx="4" fill="#16a34a"/>
<text x="641" y="141" class="ioBlock">Batch 10</text>

<text x="540" y="170" class="resultLabel" fill="#16a34a">IO count: 10 (100:1 aggregation)</text>
<text x="540" y="187" class="resultLabel" fill="#16a34a">Total time: 10 × 20ms = ~200ms</text>

<!-- Bottom explanation -->
<rect x="50" y="220" width="620" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
<text x="360" y="245" class="sectionLabel" fill="#16a34a">Why Batching Wins</text>
<text x="360" y="265" class="desc" fill="#374151">Fewer IO ops = fewer syscalls + fewer network round-trips + less downstream pressure</text>
<text x="360" y="285" class="desc" fill="#374151">Non-blocking "hides" wait time; batching prevents wait from happening in the first place</text>

<line x1="540" y1="195" x2="360" y2="218" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="360,218 367,213 367,223" fill="#86efac"/>

</svg>