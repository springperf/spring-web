<rect x="320" y="85" width="26" height="14" rx="2" fill="#ef4444"/>
<text x="355" y="96" class="desc">...</text>

<!-- Row 2 -->
<rect x="50" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="80" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="110" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="140" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="170" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="200" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="230" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="260" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="290" y="103" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="320" y="103" width="26" height="14" rx="2" fill="#ef4444"/>

<!-- Row 3 -->
<rect x="50" y="121" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="80" y="121" width="26" height="14" rx="2" fill="#ef4444"/>
<rect x="110" y="121" width="26" height="14" rx="2" fill="#ef4444"/>
