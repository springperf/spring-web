name: CI

on:
  push:
    branches: [master, 2.7.x, 3.2.x]
  pull_request:
    branches: [master, 2.7.x, 3.2.x]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: master
            java: 8
          - branch: master
            java: 11
          - branch: 2.7.x
            java: 8
          - branch: 2.7.x
            java: 11
          - branch: 3.2.x
            java: 17
          - branch: 3.2.x
            java: 21

    steps:
      - name: Check branch match
        id: check-branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.base_ref }}" = "${{ matrix.branch }}" ]; then
              echo "match=true" >> "$GITHUB_OUTPUT"
            else
              echo "match=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if [ "${{ github.ref }}" = "refs/heads/${{ matrix.branch }}" ]; then
              echo "match=true" >> "$GITHUB_OUTPUT"
            else
              echo "match=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: actions/checkout@v4
        if: steps.check-branch.outputs.match == 'true'

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        if: steps.check-branch.outputs.match == 'true'
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test
        if: steps.check-branch.outputs.match == 'true'
        run: mvn clean test -q

      - name: Upload test reports
        if: failure() && steps.check-branch.outputs.match == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java${{ matrix.java }}-${{ matrix.branch }}
          path: "**/target/surefire-reports/*.txt"