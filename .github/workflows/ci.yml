name: CI

on:
  push:
    branches: [master, 2.7.x]
  pull_request:
    branches: [master, 2.7.x]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [8, 11, 17]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test (PR to any branch, or push to 2.7.x)
        run: mvn clean test -q
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/2.7.x')

      - name: Build only (push to master)
        run: mvn clean compile -q
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java${{ matrix.java }}
          path: "**/target/surefire-reports/*.txt"